<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .form{
        text-align: center;
    }
</style>
<body>
    <form>
        <label>Username</label>
        <input type="text" placeholder="username"><br>

        <label>Password</label>
        <input type="password" placeholder="*****"><br>

        <label>Email</label>
        <input type="Email" placeholder="abc@gmail.com"><br>

        <label>Phone</label>
        <input type="tel" pattern="[0-9]{10}" placeholder="10 digit number"><br>

        <label>Gender</label>
        <select>
            <option>Male</option>
            <option>Female</option>
            <option>Prefer not say</option>
        </select><br>

    </form>
</body>
</html>
